# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.3.0"
  jupyterlab_min: "4.5.0"
  jupyterlab_max: "5"
  python_check_max: "3.14"
  grep: ${{ 'grep -iE' if unix else 'findstr /c' }}

package:
  name: jupyter-docprovider
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/j/jupyter-docprovider/jupyter_docprovider-${{ version }}.tar.gz
  sha256: c09808e15e93f2ea4ff194a18c7a8c8f83d81049fa91b09de24b09adeac9d572

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - jupyterlab >=${{ jupyterlab_min }},<${{ jupyterlab_max }}
    - hatch-jupyter-builder >=0.5
    - hatchling >=1.4.0
    - pip
    - python ${{ python_min }}.*
  run:
    - python >=${{ python_min }}
  run_constraints:
    - jupyterlab >=${{ jupyterlab_min }},<${{ jupyterlab_max }}

tests:
  - python:
      imports: jupyter_docprovider
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - requirements:
      run:
        - jupyterlab
        - python ${{ python_min }}.*
    script:
      - jupyter labextension list
      - jupyter labextension list --debug 2>&1 | ${{ grep }} "docprovider-extension.*OK"

about:
  summary: JupyterLab/Jupyter Notebook 7+ extension integrating collaborative shared models.
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - jupyter_docprovider/labextension/static/third-party-licenses.json
  homepage: https://pypi.org/project/jupyter-docprovider
  repository: https://github.com/jupyterlab/jupyter-collaboration
  documentation: https://jupyterlab-realtime-collaboration.readthedocs.io

extra:
  recipe-maintainers:
    - conda-forge/jupyter-collaboration
    - bollwyvl
